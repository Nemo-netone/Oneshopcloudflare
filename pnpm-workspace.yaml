# 只保留当前 Cloudflare Pages MVP 需要的前端工作区。
# 后端 API 使用 Cloudflare Pages Functions（functions/），不再保留旧 Express workspace。
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@expo/*'
  - expo
  - react
  - react-dom
  - react-native
  - typescript

packages:
  - artifacts/mobile

catalog:
  '@tanstack/react-query': ^5.90.21
  '@types/react': ^18.3.0
  '@types/react-dom': ^18.3.0
  react: ^18.3.1
  react-dom: ^18.3.1
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver
